databaseChangeLog:
  - changeSet:
      id: create-shoppingCart-cartItem-tables
      author: S0rbex
      changes:
         - createTable:
              tableName: shopping_cart
              columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: user_id
                    type: BIGINT
                    constraints:
                      nullable: false
                      unique: true
                - column:
                    name: is_deleted
                    type: TINYINT(1)
                    defaultValueBoolean: false
         - createTable:
              tableName: cart_items
              columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                - column:
                    name: shopping_cart_id
                    type: BIGINT
                    constraints:
                      nullable: false
                - column:
                    name: book_id
                    type: BIGINT
                    constraints:
                      nullable: false
                - column:
                    name: quantity
                    type: INT
                    constraints:
                      nullable: false
